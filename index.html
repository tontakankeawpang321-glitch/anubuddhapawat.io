<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อนุพุทธประวัติ ๘๐ พระองค์</title>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Sarabun', 'sans-serif'],
                            heading: ['Prompt', 'sans-serif'],
                        },
                        colors: {
                            cream: {
                                50: '#FDFBF7',  // Background หลัก
                                100: '#F5F0E6', // สีพื้นหลังรอง
                                200: '#EBE3D5', // สีกรอบ
                                300: '#DED1BD',
                                400: '#C7B39B',
                                500: '#B09579', // สีรอง
                                600: '#8C7355',
                                700: '#6B573F',
                                800: '#4A3F35', // สีข้อความหลัก
                                900: '#2E2721', // สีข้อความเข้ม
                                accent: '#C89D3A', // สีทอง
                                accentHover: '#B58B2E',
                            }
                        },
                        boxShadow: {
                            'elegant': '0 10px 40px -10px rgba(74, 63, 53, 0.08)',
                            'elegant-hover': '0 20px 40px -10px rgba(74, 63, 53, 0.15)',
                            'nav': '0 4px 30px rgba(74, 63, 53, 0.08)',
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #FDFBF7;
            /* เพิ่มลวดลาย Noise อ่อนๆ ให้ดูมีมิติแบบกระดาษ */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            -webkit-tap-highlight-color: transparent;
            color: #4A3F35;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #F5F0E6; }
        ::-webkit-scrollbar-thumb { background: #C7B39B; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #B09579; }
        
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Modal Transitions */
        .modal-enter { opacity: 1 !important; transform: scale(1) translateY(0) !important; }
        .backdrop-enter { opacity: 1 !important; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col selection:bg-cream-accent selection:text-white pb-32">

    <!-- Header Section (Elegant Editorial Vibe) -->
    <header class="bg-cream-50/90 backdrop-blur-md border-b border-cream-200 sticky top-0 z-40 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5 sm:py-6">
            <div class="flex flex-col items-center justify-center gap-5 text-center">
                
                <!-- Logo & Title (ใช้คลิกเพื่อกลับหน้าแรกได้) -->
                <div class="flex flex-col items-center gap-2 cursor-pointer group" onclick="goHome()">
                    <div class="w-12 h-12 flex items-center justify-center rounded-full bg-cream-100 text-cream-accent border border-cream-200 mb-1 group-hover:bg-cream-200 transition-colors">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.33-.97-2.4-1.92H7.73c.12 1.46 1.15 2.5 2.83 2.86V19h2.37v-1.65c1.76-.35 2.98-1.46 2.98-2.9 0-2.35-2.06-2.87-3.6-3.31z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl sm:text-3xl font-heading font-bold text-cream-900 tracking-wide uppercase group-hover:text-cream-accent transition-colors">อนุพุทธประวัติ</h1>
                    <p class="text-xs sm:text-sm text-cream-600 font-medium font-heading tracking-widest">อสีติมหาสาวก ๘๐ พระองค์</p>
                </div>

                <!-- Search Bar -->
                <div class="w-full max-w-md relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-cream-400 group-focus-within:text-cream-accent transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อพระสาวก, ลำดับ..." 
                        class="w-full pl-11 pr-4 py-3 bg-white border border-cream-200 rounded-full focus:outline-none focus:ring-2 focus:ring-cream-accent/20 focus:border-cream-accent text-sm font-sans transition-all duration-300 shadow-sm placeholder:text-cream-400 text-cream-800 text-center">
                </div>
            </div>
        </div>
    </header>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-32 left-1/2 transform -translate-x-1/2 -translate-y-4 z-[70] transition-all duration-400 ease-out opacity-0 pointer-events-none">
        <div class="bg-cream-900/95 backdrop-blur-md text-cream-50 px-6 py-3 rounded-full shadow-2xl font-heading text-xs sm:text-sm flex items-center gap-3 whitespace-nowrap">
            <svg class="w-5 h-5 text-cream-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="toastMessage">แจ้งเตือน</span>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
        
        <!-- No Results Message -->
        <div id="noResults" class="hidden flex-col items-center justify-center py-20 fade-up text-cream-500">
            <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
            <p class="text-xl font-heading font-semibold text-cream-700">ไม่พบรายนาม</p>
            <p class="text-sm mt-2">ลองค้นหาด้วยคำอื่นอีกครั้งครับ</p>
        </div>

        <!-- 🌟 Grid Container: 1 คอลัมน์บนมือถือ, 2 บนแท็บเล็ต, 3 บนจอใหญ่ -->
        <div id="chapterGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
            <!-- Cards will be injected here -->
        </div>

    </main>

    <!-- Modal Dialog (Options) / หน้าเลือกอ่านแบบ Minimalist -->
    <div id="mediaModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center px-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-cream-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0" id="modalBackdrop" onclick="closeModal()"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-[0_20px_60px_-15px_rgba(74,63,53,0.3)] overflow-hidden transform scale-95 opacity-0 translate-y-4 transition-all duration-400 ease-[cubic-bezier(0.16,1,0.3,1)]" id="modalContent">
            
            <!-- Header -->
            <div class="px-6 py-6 sm:px-8 sm:py-8 border-b border-cream-100 flex justify-between items-start bg-white relative">
                <!-- ตกแต่งมุม -->
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cream-300 via-cream-accent to-cream-300 opacity-50"></div>
                
                <div class="pr-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-2 h-2 rounded-full bg-cream-accent"></div>
                        <span id="modalChapterNum" class="text-cream-500 text-xs font-semibold font-heading tracking-widest uppercase">องค์ที่ XX</span>
                    </div>
                    <h3 id="modalTitle" class="text-cream-900 font-heading font-bold text-xl sm:text-2xl leading-tight">ชื่อตอน</h3>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <button id="btn-favorite" onclick="toggleFavorite()" class="text-cream-400 hover:text-red-500 bg-cream-50 hover:bg-red-50 rounded-full p-2.5 transition-colors focus:outline-none group">
                        <svg id="icon-favorite" class="w-5 h-5 transition-transform group-active:scale-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                    </button>
                    <button onclick="closeModal()" class="text-cream-400 hover:text-cream-800 bg-cream-50 hover:bg-cream-200 rounded-full p-2.5 transition-colors focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            
            <!-- Options Body -->
            <div class="px-6 py-8 sm:px-8 bg-cream-50/50">
                <p class="text-cream-600 font-heading font-medium text-sm mb-5 text-center tracking-wide">เลือกรูปแบบเนื้อหาที่ต้องการ</p>
                <div class="grid grid-cols-2 gap-4">
                    <!-- Book -->
                    <button id="btn-book" class="flex flex-col items-center justify-center p-5 rounded-2xl bg-white border border-cream-200 transition-all duration-300 hover:-translate-y-1 focus:outline-none">
                        <div class="w-12 h-12 rounded-full bg-cream-50 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-cream-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <span class="font-heading font-semibold text-sm text-cream-900">อ่านฉบับเต็ม</span>
                    </button>
                    <!-- Cartoon -->
                    <button id="btn-cartoon" class="flex flex-col items-center justify-center p-5 rounded-2xl bg-white border border-cream-200 transition-all duration-300 hover:-translate-y-1 focus:outline-none">
                        <div class="w-12 h-12 rounded-full bg-cream-50 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-cream-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <span class="font-heading font-semibold text-sm text-cream-900">ภาพการ์ตูน</span>
                    </button>
                    <!-- Video -->
                    <button id="btn-video" class="flex flex-col items-center justify-center p-5 rounded-2xl bg-white border border-cream-200 transition-all duration-300 hover:-translate-y-1 focus:outline-none">
                        <div class="w-12 h-12 rounded-full bg-cream-50 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        </div>
                        <span class="font-heading font-semibold text-sm text-cream-900">ชมวิดีโอ</span>
                    </button>
                    <!-- Podcast -->
                    <button id="btn-podcast" class="flex flex-col items-center justify-center p-5 rounded-2xl bg-white border border-cream-200 transition-all duration-300 hover:-translate-y-1 focus:outline-none">
                        <div class="w-12 h-12 rounded-full bg-cream-50 flex items-center justify-center mb-3">
                            <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        </div>
                        <span class="font-heading font-semibold text-sm text-cream-900">ฟังพอดแคสต์</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Favorites Modal Dialog -->
    <div id="favoritesModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center px-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-cream-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0" id="favBackdrop" onclick="closeFavoritesModal()"></div>
        
        <!-- Favorites Content -->
        <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-[0_20px_60px_-15px_rgba(74,63,53,0.3)] overflow-hidden transform scale-95 opacity-0 translate-y-4 transition-all duration-400 flex flex-col max-h-[85vh]" id="favoritesContent">
            
            <!-- Header -->
            <div class="px-6 py-6 border-b border-cream-100 flex justify-between items-center bg-white shrink-0 relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cream-300 via-cream-accent to-cream-300 opacity-50"></div>
                <h3 class="text-cream-900 font-heading font-bold text-lg flex items-center gap-3">
                    <svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    รายการที่บันทึกไว้
                </h3>
                <button onclick="closeFavoritesModal()" class="text-cream-400 hover:text-cream-800 bg-cream-50 hover:bg-cream-200 rounded-full p-2.5 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Favorites List Body -->
            <div id="favoritesList" class="p-4 sm:p-6 overflow-y-auto flex-grow bg-cream-50/50">
                <!-- รายการโปรดจะถูกเพิ่มที่นี่ผ่าน JavaScript -->
            </div>
        </div>
    </div>

    <!-- Documents Modal Dialog (หน้าต่างแสดงเอกสารเพิ่มเติม) -->
    <div id="docsModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center px-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-cream-900/40 backdrop-blur-sm transition-opacity duration-300 opacity-0" id="docsBackdrop" onclick="closeDocsModal()"></div>
        
        <!-- Documents Content -->
        <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-[0_20px_60px_-15px_rgba(74,63,53,0.3)] overflow-hidden transform scale-95 opacity-0 translate-y-4 transition-all duration-400 flex flex-col max-h-[85vh]" id="docsContent">
            
            <!-- Header -->
            <div class="px-6 py-6 border-b border-cream-100 flex justify-between items-center bg-white shrink-0 relative">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cream-300 via-cream-accent to-cream-300 opacity-50"></div>
                <h3 class="text-cream-900 font-heading font-bold text-lg flex items-center gap-3">
                    <svg class="w-6 h-6 text-cream-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    เอกสารเพิ่มเติม
                </h3>
                <button onclick="closeDocsModal()" class="text-cream-400 hover:text-cream-800 bg-cream-50 hover:bg-cream-200 rounded-full p-2.5 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Documents List Body -->
            <div id="docsList" class="p-4 sm:p-6 overflow-y-auto flex-grow bg-cream-50/50 flex flex-col gap-3">
                <!-- รายการเอกสารจะถูกเพิ่มที่นี่ผ่าน JavaScript -->
            </div>
        </div>
    </div>

    <!-- YouTube Modal Dialog -->
    <div id="youtubeModal" class="fixed inset-0 z-[60] hidden flex-col items-center justify-center px-4">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-cream-900/90 backdrop-blur-md transition-opacity duration-300 opacity-0" id="ytBackdrop" onclick="closeYoutubeModal()"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-4xl bg-black rounded-3xl shadow-2xl overflow-hidden transform scale-95 opacity-0 translate-y-4 transition-all duration-400" id="youtubeContent">
            <!-- Header -->
            <div class="px-4 py-3 border-b border-gray-800 flex justify-between items-center bg-gray-900 shrink-0">
                <h3 class="text-gray-200 font-heading font-medium text-sm flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                    กำลังเล่นสื่อ
                </h3>
                <button onclick="closeYoutubeModal()" class="text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 rounded-full p-2 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <!-- Video Container (16:9 Aspect Ratio) -->
            <div class="relative w-full pb-[56.25%] bg-black">
                <iframe id="youtubeIframe" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t border-cream-200 text-cream-500 py-10 text-center mt-auto">
        <div class="max-w-7xl mx-auto px-4">
            <svg class="w-8 h-8 mx-auto text-cream-300 mb-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            </svg>
            <p class="mb-2 font-heading font-semibold text-cream-800 text-lg">อนุพุทธประวัติ</p>
            <p class="text-xs text-cream-500 tracking-wider uppercase font-medium">อสีติมหาสาวก ๘๐ พระองค์ © 2026</p>
        </div>
    </footer>

    <!-- Floating Pill Navigation -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-sm sm:max-w-md">
        <nav class="bg-white/95 backdrop-blur-xl border border-cream-200 shadow-nav rounded-full px-4 sm:px-6 py-3 flex items-center justify-between gap-2 sm:gap-6">
            <!-- ปุ่มที่บันทึกไว้ -->
            <button onclick="openFavoritesModal()" class="flex-1 flex flex-col items-center gap-1 text-cream-800 hover:text-red-500 transition-colors focus:outline-none group">
                <svg class="w-6 h-6 transition-transform group-hover:-translate-y-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <span class="text-[10px] sm:text-xs font-heading font-semibold tracking-wide">ที่บันทึกไว้</span>
            </button>

        // รายการเอกสารเพิ่มเติม (ผู้ใช้สามารถมาเพิ่ม/ลดตรงนี้ได้ตามต้องการ)
        const extraDocs = [
            { title: "เว็บไซต์หลัก อนุพุทธประวัติ", url: "https://sites.google.com/view/anuphudhha" },
            { title: "รวมบทสวดมนต์และพระคาถาสำคัญ", url: "https://sites.google.com/view/anuphudhha" } // ตัวอย่างลิงก์เพิ่มเติม
        ];

        let currentChapterId = null;
        let myFavorites = JSON.parse(localStorage.getItem('anuphudhhaFavoritesV3')) || [];
        let toastTimeout;

        const toThaiNum = (num) => {
            const thaiNumbers = ['๐', '๑', '๒', '๓', '๔', '๕', '๖', '๗', '๘', '๙'];
            return num.toString().split('').map(digit => thaiNumbers[digit]).join('');
        };

        const grid = document.getElementById('chapterGrid');
        const noResults = document.getElementById('noResults');

        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 2500);
        }

        function renderChapters(data) {
            grid.innerHTML = '';
            
            const visibleChapters = data.filter(chapter => chapter.image && chapter.image.trim() !== '');
            
            if (visibleChapters.length === 0) {
                noResults.classList.remove('hidden');
                noResults.classList.add('flex');
            } else {
                noResults.classList.add('hidden');
                noResults.classList.remove('flex');
                
                visibleChapters.forEach((chapter, index) => {
                    const delay = `animation-delay: ${Math.min(index * 0.04, 0.6)}s`;
                    const imgUrl = chapter.image;
                    const card = document.createElement('div');
                    
                    // ปรับรูปภาพแนวนอน aspect-[4/3] บนมือถือ และ aspect-[4/5] บนจอใหญ่
                    card.className = "fade-up cursor-pointer group flex flex-col w-full rounded-[24px] overflow-hidden bg-white shadow-[0_8px_30px_rgb(74,63,53,0.04)] border border-cream-200 hover:shadow-elegant-hover transition-all duration-400 transform hover:-translate-y-1.5 h-full relative";
                    card.style = delay;
                    
                    card.innerHTML = `
                        <div onclick="openModal(${chapter.id})" class="flex flex-col h-full relative z-10">
                            <div class="relative w-full aspect-[4/3] sm:aspect-[4/5] bg-cream-100 overflow-hidden">
                                <img src="${imgUrl}" alt="${chapter.title}" 
                                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-cream-900/80 via-transparent to-transparent opacity-70"></div>
                                <div class="absolute top-4 left-4 bg-white/95 backdrop-blur-sm text-cream-800 text-[10px] sm:text-xs font-bold font-heading px-3 py-1.5 rounded-full shadow-sm">
                                    องค์ที่ ${toThaiNum(chapter.id)}
                                </div>
                                <div class="absolute bottom-4 left-4 right-4">
                                    <h3 class="text-white font-heading font-bold text-lg sm:text-xl leading-tight line-clamp-2 drop-shadow-md">
                                        ${chapter.title}
                                    </h3>
                                </div>
                            </div>
                            <div class="px-5 py-4 sm:px-6 sm:py-5 flex-grow flex flex-col bg-cream-50/50">
                                <p class="text-xs sm:text-sm text-cream-700 leading-relaxed line-clamp-3">
                                    ${chapter.desc}
                                </p>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        renderChapters(chapters);

        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            const filteredChapters = chapters.filter(chapter => {
                const chapterNumStr = chapter.id.toString();
                const thaiChapterNumStr = toThaiNum(chapter.id);
                
                return chapter.title.toLowerCase().includes(searchTerm) || 
                       chapter.desc.toLowerCase().includes(searchTerm) ||
                       chapterNumStr.includes(searchTerm) ||
                       thaiChapterNumStr.includes(searchTerm);
            });
            
            renderChapters(filteredChapters);
        });

        function setupModalButton(btnId, url, activeColors, isYoutube = false) {
            const btn = document.getElementById(btnId);
            
            btn.onclick = null;
            
            if (url) {
                if (isYoutube) {
                    btn.onclick = () => openYoutubeModal(url);
                } else {
                    const safeUrl = url.replace(/[^\x00-\x7F]/g, c => encodeURIComponent(c));
                    btn.onclick = () => window.open(safeUrl, '_blank', 'noopener,noreferrer');
                }
                btn.className = `flex flex-col items-center justify-center p-5 rounded-2xl bg-white border transition-all duration-300 hover:-translate-y-1 focus:outline-none ${activeColors} cursor-pointer group`;
            } else {
                btn.onclick = (e) => {
                    e.preventDefault();
                    showToast('กำลังจัดทำเนื้อหาส่วนนี้ครับ 🙏');
                };
                btn.className = "flex flex-col items-center justify-center p-5 rounded-2xl bg-cream-50 border border-cream-200 transition-all duration-300 focus:outline-none cursor-not-allowed opacity-60";
            }
        }

        function openModal(id) {
            const chapter = chapters.find(ch => ch.id === id);
            if (!chapter) return;
            
            currentChapterId = id;
            updateFavoriteButtonUI();
            
            document.getElementById('modalChapterNum').textContent = `องค์ที่ ${toThaiNum(chapter.id)}`;
            document.getElementById('modalTitle').textContent = chapter.title;
            
            // Custom button themes matching the elegant vibe
            setupModalButton('btn-book', chapter.urls?.book, 'border-cream-200 hover:border-cream-400 hover:shadow-elegant-hover');
            setupModalButton('btn-cartoon', chapter.urls?.cartoon, 'border-cream-200 hover:border-cream-accent hover:shadow-elegant-hover');
            setupModalButton('btn-video', chapter.urls?.video, 'border-cream-200 hover:border-red-400 hover:shadow-elegant-hover', true);
            setupModalButton('btn-podcast', chapter.urls?.podcast, 'border-cream-200 hover:border-teal-400 hover:shadow-elegant-hover', true);
            
            const modal = document.getElementById('mediaModal');
            const backdrop = document.getElementById('modalBackdrop');
            const content = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Trigger reflow
            void modal.offsetWidth;
            
            backdrop.classList.add('backdrop-enter');
            content.classList.add('modal-enter');
        }

        function closeModal() {
            const modal = document.getElementById('mediaModal');
            const backdrop = document.getElementById('modalBackdrop');
            const content = document.getElementById('modalContent');
            
            backdrop.classList.remove('backdrop-enter');
            content.classList.remove('modal-enter');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 400);
        }

        function getYoutubeEmbedUrl(url) {
            let videoId = '';
            if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('youtube.com/watch')) {
                try {
                    videoId = new URL(url).searchParams.get('v');
                } catch(e) {}
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1` : '';
        }

        function openYoutubeModal(url) {
            const embedUrl = getYoutubeEmbedUrl(url);
            if (!embedUrl) {
                window.open(url, '_blank');
                return;
            }
            
            closeModal();
            
            const iframe = document.getElementById('youtubeIframe');
            iframe.src = embedUrl;
            
            const modal = document.getElementById('youtubeModal');
            const backdrop = document.getElementById('ytBackdrop');
            const content = document.getElementById('youtubeContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            void modal.offsetWidth;
            backdrop.classList.add('backdrop-enter');
            content.classList.add('modal-enter');
        }

        function closeYoutubeModal() {
            const modal = document.getElementById('youtubeModal');
            const backdrop = document.getElementById('ytBackdrop');
            const content = document.getElementById('youtubeContent');
            const iframe = document.getElementById('youtubeIframe');
            
            backdrop.classList.remove('backdrop-enter');
            content.classList.remove('modal-enter');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                iframe.src = '';
            }, 400);
        }

        function toggleFavorite() {
            if (!currentChapterId) return;
            
            const index = myFavorites.indexOf(currentChapterId);
            if (index === -1) {
                myFavorites.push(currentChapterId);
                showToast('บันทึกเข้ารายการโปรดแล้ว ⭐️');
            } else {
                myFavorites.splice(index, 1);
                showToast('นำออกจากรายการโปรดแล้ว');
            }
            
            localStorage.setItem('anuphudhhaFavoritesV3', JSON.stringify(myFavorites));
            updateFavoriteButtonUI();
        }

        function updateFavoriteButtonUI() {
            const icon = document.getElementById('icon-favorite');
            if (myFavorites.includes(currentChapterId)) {
                icon.setAttribute('fill', 'currentColor');
                icon.classList.add('text-red-500', 'scale-110');
            } else {
                icon.setAttribute('fill', 'none');
                icon.classList.remove('text-red-500', 'scale-110');
            }
        }

        function openFavoritesModal() {
            closeModal();
            closeDocsModal();
            renderFavoritesList();
            
            const modal = document.getElementById('favoritesModal');
            const backdrop = document.getElementById('favBackdrop');
            const content = document.getElementById('favoritesContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            void modal.offsetWidth;
            backdrop.classList.add('backdrop-enter');
            content.classList.add('modal-enter');
        }

        function closeFavoritesModal() {
            const modal = document.getElementById('favoritesModal');
            const backdrop = document.getElementById('favBackdrop');
            const content = document.getElementById('favoritesContent');
            
            backdrop.classList.remove('backdrop-enter');
            content.classList.remove('modal-enter');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 400);
        }

        function renderFavoritesList() {
            const listContainer = document.getElementById('favoritesList');
            
            if (myFavorites.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12 opacity-60">
                        <svg class="mx-auto h-16 w-16 text-cream-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                        <p class="text-cream-800 font-heading text-sm">ยังไม่ได้บันทึกอะไรไว้เลย</p>
                    </div>
                `;
                return;
            }

            const favChapters = myFavorites.map(id => chapters.find(c => c.id === id)).filter(Boolean);
            
            listContainer.innerHTML = favChapters.map(chapter => `
                <div onclick="openModalFromFavorites(${chapter.id})" class="flex items-center gap-4 p-4 mb-3 bg-white rounded-2xl shadow-sm border border-cream-100 hover:shadow-md cursor-pointer transition-all duration-300 transform hover:-translate-y-1 group">
                    <img src="${chapter.image}" class="w-16 h-16 rounded-xl object-cover shadow-sm shrink-0">
                    <div class="flex-grow overflow-hidden">
                        <span class="text-[10px] sm:text-xs font-bold font-heading text-cream-accent tracking-widest uppercase mb-1 block">องค์ที่ ${toThaiNum(chapter.id)}</span>
                        <h4 class="font-heading font-bold text-sm sm:text-base text-cream-900 line-clamp-1 group-hover:text-cream-accent transition-colors">${chapter.title}</h4>
                    </div>
                    <button onclick="event.stopPropagation(); removeFavorite(${chapter.id})" class="p-2 text-cream-300 hover:text-red-500 transition-colors shrink-0 focus:outline-none">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeFavorite(id) {
            const index = myFavorites.indexOf(id);
            if (index > -1) {
                myFavorites.splice(index, 1);
                localStorage.setItem('anuphudhhaFavoritesV3', JSON.stringify(myFavorites));
                renderFavoritesList();
                showToast('นำออกจากรายการโปรดแล้ว');
            }
        }

        function openModalFromFavorites(id) {
            closeFavoritesModal();
            setTimeout(() => {
                openModal(id);
            }, 400); 
        }

        // --- Logic สำหรับเอกสารเพิ่มเติม (Docs Modal) ---
        function openDocsModal() {
            closeModal();
            closeFavoritesModal();
            renderDocsList();
            
            const modal = document.getElementById('docsModal');
            const backdrop = document.getElementById('docsBackdrop');
            const content = document.getElementById('docsContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            void modal.offsetWidth; // Trigger reflow
            backdrop.classList.add('backdrop-enter');
            content.classList.add('modal-enter');
        }

        function closeDocsModal() {
            const modal = document.getElementById('docsModal');
            const backdrop = document.getElementById('docsBackdrop');
            const content = document.getElementById('docsContent');
            
            backdrop.classList.remove('backdrop-enter');
            content.classList.remove('modal-enter');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 400);
        }

        function renderDocsList() {
            const listContainer = document.getElementById('docsList');
            
            if (extraDocs.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12 opacity-60">
                        <p class="text-cream-800 font-heading text-sm">ยังไม่มีเอกสารเพิ่มเติม</p>
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = extraDocs.map(doc => {
                const safeUrl = doc.url.replace(/[^\x00-\x7F]/g, c => encodeURIComponent(c));
                return `
                    <a href="${safeUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-cream-100 hover:shadow-md cursor-pointer transition-all duration-300 transform hover:-translate-y-1 group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-cream-50 flex items-center justify-center text-cream-600 group-hover:bg-cream-accent group-hover:text-white transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            </div>
                            <h4 class="font-heading font-bold text-sm sm:text-base text-cream-900 group-hover:text-cream-accent transition-colors">${doc.title}</h4>
                        </div>
                        <svg class="w-5 h-5 text-cream-300 group-hover:text-cream-accent transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                `;
            }).join('');
        }

        // --- Logic กลับหน้าแรก (Go Home) ---
        function goHome() {
            closeModal();
            closeFavoritesModal();
            closeDocsModal();
            window.scrollTo({top: 0, behavior: 'smooth'});
            document.getElementById('searchInput').value = '';
            renderChapters(chapters);
        }

    </script>
</body>
</html>
