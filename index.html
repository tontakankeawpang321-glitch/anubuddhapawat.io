        // ตัวแปรสำหรับระบบรายการโปรด
        let currentChapterId = null;
        let myFavorites = JSON.parse(localStorage.getItem('anuphudhhaFavoritesV2')) || [];
        let toastTimeout;

        // ฟังก์ชันแปลงตัวเลขเป็นเลขไทย
        const toThaiNum = (num) => {
            const thaiNumbers = ['๐', '๑', '๒', '๓', '๔', '๕', '๖', '๗', '๘', '๙'];
            return num.toString().split('').map(digit => thaiNumbers[digit]).join('');
        };

        const grid = document.getElementById('chapterGrid');
        const noResults = document.getElementById('noResults');

        // ฟังก์ชันแจ้งเตือน Toast
        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 2500);
        }

        // Render chapters function
        function renderChapters(data) {
            grid.innerHTML = '';
            
            const visibleChapters = data.filter(chapter => chapter.image && chapter.image.trim() !== '');
            
            if (visibleChapters.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                
                visibleChapters.forEach((chapter, index) => {
                    const delay = `animation-delay: ${Math.min(index * 0.04, 0.6)}s`;
                    const imgUrl = chapter.image;
                    const card = document.createElement('div');
                    card.className = "fade-up cursor-pointer group flex flex-col w-full rounded-[14px] sm:rounded-2xl overflow-hidden bg-white shadow-sm border-2 border-slate-100 hover:border-monk-primary hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 h-full";
                    card.style = delay;
                    
                    card.innerHTML = `
                        <div onclick="openModal(${chapter.id})" class="flex flex-col h-full">
                            <div class="relative w-full aspect-square bg-slate-100 overflow-hidden">
                                <img src="${imgUrl}" alt="${chapter.title}" 
                                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" loading="lazy">
                                <div class="absolute top-1.5 left-1.5 sm:top-2 sm:left-2 bg-monk-accent text-white text-[9px] sm:text-xs font-bold font-heading px-1.5 sm:px-2 py-0.5 sm:py-1 rounded-md shadow-sm">
                                    องค์ที่ ${toThaiNum(chapter.id)}
                                </div>
                            </div>
                            <div class="p-2 sm:p-3 flex-grow flex flex-col justify-center">
                                <h3 class="text-[11px] sm:text-sm font-heading font-bold text-slate-800 leading-snug line-clamp-1 group-hover:text-monk-primary transition-colors">
                                    ${chapter.title}
                                </h3>
                                <p class="hidden sm:-webkit-box text-xs text-slate-500 leading-relaxed line-clamp-2 mt-1.5">
                                    ${chapter.desc}
                                </p>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Initial Render
        renderChapters(chapters);

        // Search Functionality
        const searchInput = document.getElementById('searchInput');
        
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            const filteredChapters = chapters.filter(chapter => {
                const chapterNumStr = chapter.id.toString();
                const thaiChapterNumStr = toThaiNum(chapter.id);
                
                return chapter.title.toLowerCase().includes(searchTerm) || 
                       chapter.desc.toLowerCase().includes(searchTerm) ||
                       chapterNumStr.includes(searchTerm) ||
                       thaiChapterNumStr.includes(searchTerm);
            });
            
            renderChapters(filteredChapters);
        });

        // --- Logic สำหรับ Modal เลือกสื่อ ---
        function setupModalButton(btnId, url, activeColors, isYoutube = false) {
            const btn = document.getElementById(btnId);
            const icon = btn.querySelector('svg');
            const text = btn.querySelector('span');
            
            const baseBtnClass = "flex flex-col items-center justify-center p-3 sm:p-4 rounded-xl border-2 transition-all duration-200 group w-full focus:outline-none ";
            
            // ล้าง onclick เก่าก่อนเสมอ
            btn.onclick = null;
            
            if (url) {
                if (isYoutube) {
                    btn.onclick = () => openYoutubeModal(url);
                } else {
                    // Encode URL ป้องกันปัญหาภาษาไทยในลิงก์ (เช่น Google Sites)
                    const safeUrl = url.replace(/[^\x00-\x7F]/g, c => encodeURIComponent(c));
                    btn.onclick = () => window.open(safeUrl, '_blank', 'noopener,noreferrer');
                }
                btn.className = baseBtnClass + activeColors + " cursor-pointer hover:-translate-y-1 hover:shadow-md";
                icon.className = "w-7 h-7 sm:w-8 sm:h-8 mb-2 transition-transform group-hover:scale-110";
                text.className = "font-heading font-bold text-xs sm:text-sm";
            } else {
                btn.onclick = (e) => {
                    e.preventDefault();
                    showToast('กำลังจัดทำเนื้อหาส่วนนี้ครับ 🙏');
                };
                btn.className = baseBtnClass + "border-slate-200 bg-slate-50 cursor-not-allowed opacity-60";
                icon.className = "w-7 h-7 sm:w-8 sm:h-8 mb-2 text-slate-400";
                text.className = "font-heading font-bold text-xs sm:text-sm text-slate-400";
            }
        }

        function openModal(id) {
            const chapter = chapters.find(ch => ch.id === id);
            if (!chapter) return;
            
            currentChapterId = id; // กำหนดองค์ที่กำลังเลือก
            updateFavoriteButtonUI(); // อัปเดตสีปุ่มหัวใจ
            
            document.getElementById('modalChapterNum').textContent = `องค์ที่ ${toThaiNum(chapter.id)}`;
            document.getElementById('modalTitle').textContent = chapter.title;
            
            setupModalButton('btn-book', chapter.urls?.book, 'border-orange-200 bg-orange-50 text-orange-600 hover:border-orange-500 hover:bg-orange-100');
            setupModalButton('btn-cartoon', chapter.urls?.cartoon, 'border-yellow-200 bg-yellow-50 text-yellow-600 hover:border-yellow-500 hover:bg-yellow-100');
            setupModalButton('btn-video', chapter.urls?.video, 'border-red-200 bg-red-50 text-red-600 hover:border-red-500 hover:bg-red-100', true);
            setupModalButton('btn-podcast', chapter.urls?.podcast, 'border-teal-200 bg-teal-50 text-teal-600 hover:border-teal-500 hover:bg-teal-100', true);
            
            const modal = document.getElementById('mediaModal');
            const content = document.getElementById('modalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('mediaModal');
            const content = document.getElementById('modalContent');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // --- Logic สำหรับ YouTube Modal ---
        function getYoutubeEmbedUrl(url) {
            let videoId = '';
            if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('youtube.com/watch')) {
                try {
                    videoId = new URL(url).searchParams.get('v');
                } catch(e) {}
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}?autoplay=1` : '';
        }

        function openYoutubeModal(url) {
            const embedUrl = getYoutubeEmbedUrl(url);
            if (!embedUrl) {
                // หาก URL ไม่ใช่รูปแบบ YouTube ปกติ ให้เปิดแท็บใหม่
                window.open(url, '_blank');
                return;
            }
            
            closeModal(); // ปิดหน้าต่างเลือกสื่อเดิมก่อน
            
            const iframe = document.getElementById('youtubeIframe');
            iframe.src = embedUrl;
            
            const modal = document.getElementById('youtubeModal');
            const content = document.getElementById('youtubeContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeYoutubeModal() {
            const modal = document.getElementById('youtubeModal');
            const content = document.getElementById('youtubeContent');
            const iframe = document.getElementById('youtubeIframe');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                iframe.src = ''; // เคลียร์วิดีโอเมื่อปิด
            }, 300);
        }

        // --- Logic สำหรับรายการโปรด (Favorites) ---
        function toggleFavorite() {
            if (!currentChapterId) return;
            
            const index = myFavorites.indexOf(currentChapterId);
            if (index === -1) {
                myFavorites.push(currentChapterId); // เพิ่มเข้าโปรด
                showToast('บันทึกเข้ารายการโปรดแล้ว ⭐️');
            } else {
                myFavorites.splice(index, 1); // เอาออกจากโปรด
                showToast('นำออกจากรายการโปรดแล้ว');
            }
            
            localStorage.setItem('anuphudhhaFavoritesV2', JSON.stringify(myFavorites));
            updateFavoriteButtonUI();
        }

        function updateFavoriteButtonUI() {
            const icon = document.getElementById('icon-favorite');
            if (myFavorites.includes(currentChapterId)) {
                icon.setAttribute('fill', 'currentColor');
                icon.classList.add('text-red-500');
                icon.classList.remove('text-slate-400');
            } else {
                icon.setAttribute('fill', 'none');
                icon.classList.remove('text-red-500');
                icon.classList.add('text-slate-400');
            }
        }

        function openFavoritesModal() {
            closeModal(); // ปิดหน้าต่างเลือกอ่าน (ถ้าเปิดอยู่)
            renderFavoritesList(); // อัปเดตรายการ
            
            const modal = document.getElementById('favoritesModal');
            const content = document.getElementById('favoritesContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeFavoritesModal() {
            const modal = document.getElementById('favoritesModal');
            const content = document.getElementById('favoritesContent');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function renderFavoritesList() {
            const listContainer = document.getElementById('favoritesList');
            
            if (myFavorites.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-12">
                        <svg class="mx-auto h-12 w-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                        </svg>
                        <p class="text-slate-500 font-heading text-sm">ยังไม่มีรายการโปรดเลย ลองเพิ่มดูสิ!</p>
                    </div>
                `;
                return;
            }

            // ดึงข้อมูลบทที่ตรงกับไอดีใน myFavorites
            const favChapters = myFavorites.map(id => chapters.find(c => c.id === id)).filter(Boolean);
            
            listContainer.innerHTML = favChapters.map(chapter => `
                <div onclick="openModalFromFavorites(${chapter.id})" class="flex items-center gap-3 p-3 mb-2 border border-slate-100 bg-slate-50 hover:bg-slate-100 cursor-pointer rounded-xl transition-colors">
                    <img src="${chapter.image}" class="w-14 h-14 rounded-lg object-cover shadow-sm shrink-0">
                    <div class="flex-grow overflow-hidden">
                        <span class="text-[10px] sm:text-xs font-bold font-heading text-monk-accent mb-0.5 block">องค์ที่ ${toThaiNum(chapter.id)}</span>
                        <h4 class="font-heading font-bold text-sm text-slate-800 line-clamp-1">${chapter.title}</h4>
                    </div>
                    <button onclick="event.stopPropagation(); removeFavorite(${chapter.id})" class="p-2 text-slate-300 hover:text-red-500 transition-colors shrink-0 focus:outline-none">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeFavorite(id) {
            const index = myFavorites.indexOf(id);
            if (index > -1) {
                myFavorites.splice(index, 1);
                localStorage.setItem('anuphudhhaFavoritesV2', JSON.stringify(myFavorites));
                renderFavoritesList(); // โหลดรายการใหม่
                showToast('นำออกจากรายการโปรดแล้ว');
            }
        }

        function openModalFromFavorites(id) {
            closeFavoritesModal(); // ปิดหน้าโปรดก่อน
            setTimeout(() => {
                openModal(id); // แล้วเปิดหน้าต่างเลือกอ่าน
            }, 300); 
        }

        // ฟังก์ชันสำหรับปุ่มหน้าแรก (Bottom Nav)
        function goHome() {
            closeModal();
            closeFavoritesModal();
            window.scrollTo({top: 0, behavior: 'smooth'});
            // รีเซ็ตการค้นหา
            document.getElementById('searchInput').value = '';
            renderChapters(chapters);
        }

    </script>
</body>
</html>
