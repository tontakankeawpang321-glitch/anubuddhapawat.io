<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>อนุพุทธประวัติ ๘๐ พระองค์</title>
    
    <script>
        window.tailwind = {
            config: {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Sarabun', 'sans-serif'],
                            heading: ['Prompt', 'sans-serif'],
                        },
                        colors: {
                            monk: {
                                50: '#fffbf7',
                                100: '#ffedd5',
                                200: '#fed7aa',
                                primary: '#d97706',
                                secondary: '#b45309',
                                text: '#292524',
                                textMuted: '#78716c',
                                dark: '#1c1917',
                                bg: '#faf9f6',
                            }
                        },
                        boxShadow: {
                            'soft': '0 4px 20px -2px rgba(0,0,0,0.03)',
                            'float': '0 12px 30px -8px rgba(217,119,6,0.15)',
                            'sheet': '0 -10px 40px rgba(0,0,0,0.08)',
                        }
                    }
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: theme('colors.monk.bg'); 
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, transparent 70%);
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        * { scrollbar-width: none; }

        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .bottom-sheet {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateY(100%);
        }
        .bottom-sheet.open {
            transform: translateY(0);
        }
        
        .backdrop {
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .backdrop.open {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-header {
            background: rgba(250, 249, 246, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .card-group:hover .card-img {
            transform: scale(1.05);
        }
        
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* ปุ่มใน sheet ทั้งหมดเป็น button เหมือนกัน */
        .sheet-btn {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-radius: 1rem;
            background: #f9f9f9;
            border: 1px solid transparent;
            cursor: pointer;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
        }
        .sheet-btn:hover { background: #fffbeb; border-color: #fcd34d; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .sheet-btn.disabled { opacity: 0.45; filter: grayscale(1); cursor: not-allowed; }
    </style>
</head>
<body class="text-monk-text antialiased min-h-screen flex flex-col selection:bg-monk-primary selection:text-white pb-28">

    <!-- Top Header -->
    <header class="sticky top-0 z-40 glass-header shadow-sm">
        <div class="max-w-3xl mx-auto px-5 py-3.5 sm:py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-amber-100 to-orange-50 flex items-center justify-center border border-amber-200/50 shadow-inner">
                    <svg class="w-5 h-5 text-monk-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.31-8.86c-1.77-.45-2.34-.94-2.34-1.67 0-.84.79-1.43 2.1-1.43 1.38 0 1.9.66 1.94 1.64h1.71c-.05-1.34-.87-2.57-2.49-2.97V5H10.9v1.69c-1.51.32-2.72 1.3-2.72 2.81 0 1.79 1.49 2.69 3.66 3.21 1.95.46 2.34 1.15 2.34 1.87 0 .53-.39 1.64-2.25 1.64-1.74 0-2.33-.97-2.4-1.92H7.73c.12 1.46 1.15 2.5 2.83 2.86V19h2.37v-1.65c1.76-.35 2.98-1.46 2.98-2.9 0-2.35-2.06-2.87-3.6-3.31z"/></svg>
                </div>
                <div>
                    <h1 class="text-[19px] sm:text-xl font-heading font-bold text-monk-dark leading-none tracking-tight">อนุพุทธประวัติ</h1>
                    <p class="text-[12px] sm:text-xs text-monk-primary font-medium mt-1">อสีติมหาสาวก ๘๐ พระองค์</p>
                </div>
            </div>
            <button onclick="window.switchTab('fav')" id="btn-top-fav" class="p-2.5 rounded-full text-stone-400 hover:text-red-500 hover:bg-red-50 transition-all active:scale-90 focus:outline-none relative">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <div id="fav-dot" class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></div>
            </button>
        </div>
    </header>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 -translate-y-4 z-[70] transition-all duration-400 ease-out opacity-0 pointer-events-none">
        <div class="bg-stone-900/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-2xl font-heading text-[13px] sm:text-sm flex items-center gap-3 whitespace-nowrap border border-white/10">
            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="toastMessage">แจ้งเตือน</span>
        </div>
    </div>

    <!-- Search Section -->
    <section class="max-w-3xl mx-auto w-full px-5 pt-6 pb-2">
        <div class="relative w-full group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-monk-primary text-stone-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อพระสาวก, ลำดับ..." 
                class="w-full pl-11 pr-5 py-3.5 bg-white/70 backdrop-blur-sm border border-stone-200 rounded-full shadow-soft focus:outline-none focus:ring-2 focus:ring-monk-primary/20 focus:border-monk-primary focus:bg-white text-[15px] font-sans transition-all placeholder:text-stone-400 hover:bg-white">
        </div>
        
        <div class="flex justify-between items-end mt-8 mb-4 px-1">
            <h2 id="sectionTitle" class="text-lg font-heading font-bold text-stone-800 tracking-tight">รายนามทั้งหมด</h2>
            <div class="bg-stone-100 px-3 py-1 rounded-full border border-stone-200/60">
                <span id="itemCount" class="text-[11px] text-stone-600 font-bold font-heading">80 องค์</span>
            </div>
        </div>
    </section>

    <!-- Main Content: Grid View -->
    <main class="flex-grow w-full max-w-3xl mx-auto px-5">
        
        <div id="noResults" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-soft border border-stone-100">
                <svg class="w-10 h-10 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <p class="text-lg font-heading font-semibold text-stone-700">ไม่พบข้อมูลที่ค้นหา</p>
            <p class="text-sm text-stone-500 mt-1" id="noResultsText">ลองใช้คำค้นหาอื่นดูอีกครั้งครับ</p>
        </div>

        <div id="chapterList" class="grid grid-cols-2 md:grid-cols-3 gap-4 sm:gap-5 pb-6"></div>
    </main>

    <!-- Bottom Sheet -->
    <div id="backdrop" class="fixed inset-0 bg-stone-900/40 backdrop z-50 backdrop-blur-[2px]" onclick="window.closeSheet()"></div>
    
    <div class="fixed inset-0 z-50 flex items-end justify-center pointer-events-none overflow-hidden">
        <div id="bottomSheet" class="bottom-sheet bg-white w-full max-w-md rounded-t-[32px] shadow-sheet pointer-events-auto flex flex-col max-h-[88vh]">
            
            <div class="w-full flex justify-center pt-4 pb-2" onclick="window.closeSheet()">
                <div class="w-12 h-1.5 bg-stone-200 rounded-full cursor-pointer hover:bg-stone-300 transition-colors"></div>
            </div>

            <div class="px-6 py-2 flex justify-between items-start relative">
                <div class="pr-12">
                    <span id="sheetOrder" class="inline-block px-2.5 py-1 bg-amber-50 text-monk-secondary text-[10px] font-bold font-heading rounded-lg mb-2 border border-amber-100/50">องค์ที่ ๑</span>
                    <h3 id="sheetTitle" class="text-[22px] font-heading font-bold text-stone-800 leading-tight">ชื่อพระสาวก</h3>
                    <p id="sheetDesc" class="text-[13px] text-monk-textMuted mt-1.5 leading-relaxed">คำอธิบาย</p>
                </div>
                <button onclick="window.toggleFavorite()" class="absolute top-2 right-6 w-11 h-11 rounded-full flex items-center justify-center text-stone-400 hover:text-red-500 bg-white border border-stone-100 shadow-soft active:scale-90 transition-all focus:outline-none">
                    <svg id="icon-favorite" class="w-6 h-6 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                </button>
            </div>
            
            <div class="mx-6 my-4 border-t border-stone-100"></div>

            <!-- ✅ ปุ่มทั้งหมดเป็น button ไม่ใช่ a tag + ใช้ data-url เก็บ URL -->
            <div class="px-6 pb-10 overflow-y-auto">
                <div class="flex flex-col gap-3">
                    
                    <button id="btn-book" class="sheet-btn group" data-url="" data-type="link">
                        <div class="w-12 h-12 rounded-full bg-white shadow-sm text-orange-500 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:scale-105">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <div class="text-left flex-grow">
                            <div class="font-heading font-semibold text-[15px] text-stone-800 group-hover:text-amber-700 transition-colors">อ่านประวัติฉบับเต็ม</div>
                            <div class="text-[11px] text-stone-400 mt-0.5">บทความบนเว็บไซต์ (เปิดแท็บใหม่)</div>
                        </div>
                        <svg class="w-5 h-5 text-stone-300 group-hover:text-amber-400 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>

                    <button id="btn-cartoon" class="sheet-btn group" data-url="" data-type="link">
                        <div class="w-12 h-12 rounded-full bg-white shadow-sm text-yellow-500 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:scale-105">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div class="text-left flex-grow">
                            <div class="font-heading font-semibold text-[15px] text-stone-800 group-hover:text-amber-700 transition-colors">ภาพการ์ตูน</div>
                            <div class="text-[11px] text-stone-400 mt-0.5">เข้าใจง่ายสำหรับทุกวัย (เปิดแท็บใหม่)</div>
                        </div>
                        <svg class="w-5 h-5 text-stone-300 group-hover:text-amber-400 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                    
                    <button id="btn-video" class="sheet-btn group" data-url="" data-type="youtube">
                        <div class="w-12 h-12 rounded-full bg-white shadow-sm text-rose-500 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:scale-105">
                            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                        </div>
                        <div class="text-left flex-grow">
                            <div class="font-heading font-semibold text-[15px] text-stone-800 group-hover:text-rose-700 transition-colors">ชมวิดีโอ</div>
                            <div class="text-[11px] text-stone-400 mt-0.5">รับชม YouTube ภายในเว็บ</div>
                        </div>
                        <svg class="w-5 h-5 text-stone-300 group-hover:text-rose-400 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>

                    <button id="btn-podcast" class="sheet-btn group" data-url="" data-type="youtube">
                        <div class="w-12 h-12 rounded-full bg-white shadow-sm text-teal-500 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:scale-105">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        </div>
                        <div class="text-left flex-grow">
                            <div class="font-heading font-semibold text-[15px] text-stone-800 group-hover:text-teal-700 transition-colors">ฟังพอดแคสต์</div>
                            <div class="text-[11px] text-stone-400 mt-0.5">ฟังเสียงบรรยายภายในเว็บ</div>
                        </div>
                        <svg class="w-5 h-5 text-stone-300 group-hover:text-teal-400 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating Bottom Nav -->
    <div class="fixed bottom-6 left-0 w-full px-5 z-40 flex justify-center pointer-events-none">
        <nav class="glass-nav px-8 py-3.5 rounded-full shadow-float pointer-events-auto flex items-center gap-10 border border-white">
            <button onclick="window.switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1.5 text-monk-primary transition-colors focus:outline-none group">
                <svg class="w-6 h-6 group-active:scale-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="text-[11px] font-heading font-bold">หน้าแรก</span>
            </button>
            <div class="w-px h-8 bg-stone-200"></div>
            <button onclick="window.switchTab('fav')" id="nav-fav" class="flex flex-col items-center gap-1.5 text-stone-400 hover:text-red-500 transition-colors focus:outline-none group">
                <svg class="w-6 h-6 group-active:scale-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                <span class="text-[11px] font-heading font-bold">บันทึกไว้</span>
            </button>
        </nav>
    </div>

    <!-- Scroll to Top FAB -->
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="fab-top" class="fixed bottom-24 right-5 sm:right-8 z-30 bg-white/90 backdrop-blur text-stone-500 p-3.5 rounded-full shadow-soft border border-stone-200 active:scale-90 hover:text-monk-primary hover:border-monk-primary transition-all focus:outline-none opacity-0 translate-y-4 pointer-events-none">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path></svg>
    </button>

    <!-- YouTube Modal -->
    <div id="ytBackdrop" class="fixed inset-0 bg-black/95 backdrop z-[60]" onclick="window.closeYoutube()" style="display:none"></div>
    <div id="ytModal" class="fixed inset-0 z-[60] flex flex-col items-center justify-center px-4 pointer-events-none opacity-0 transition-opacity duration-300">
        <div class="w-full max-w-4xl bg-stone-900 rounded-2xl overflow-hidden shadow-2xl pointer-events-auto flex flex-col border border-white/10">
            <div class="px-4 py-3 flex justify-between items-center bg-stone-900 border-b border-white/10">
                <div class="text-white/80 font-heading text-sm font-medium" id="ytModalTitle">กำลังเล่นวิดีโอ...</div>
                <button onclick="window.closeYoutube()" class="text-stone-400 hover:text-white bg-stone-800 hover:bg-red-500 rounded-full p-2 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="relative w-full pb-[56.25%] bg-black">
                <iframe id="youtubeIframe" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_IMAGE_URL = 'https://images.unsplash.com/photo-1540455855018-c2b99fa2e41a?auto=format&fit=crop&q=80&w=400';

        window.addEventListener('scroll', () => {
            const fab = document.getElementById('fab-top');
            if (window.scrollY > 300) {
                fab.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                fab.classList.add('opacity-100', 'translate-y-0', 'pointer-events-auto');
            } else {
                fab.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                fab.classList.remove('opacity-100', 'translate-y-0', 'pointer-events-auto');
            }
        });

        const chapters = [

        ];

        let myFavorites = JSON.parse(localStorage.getItem('anuphudhhaFavorites')) || [];
        let isFavMode = false;
        let toastTimeout;
        let currentChapterId = null;

        const toThaiNum = (num) => {
            const thaiNumbers = ['๐', '๑', '๒', '๓', '๔', '๕', '๖', '๗', '๘', '๙'];
            return num.toString().split('').map(digit => thaiNumbers[digit]).join('');
        };

        const listContainer = document.getElementById('chapterList');
        const noResults = document.getElementById('noResults');
        const itemCount = document.getElementById('itemCount');
        const sectionTitle = document.getElementById('sectionTitle');

        // ✅ ลงทะเบียน handler ครั้งเดียวตอน load — อ่าน data-url ตอน click
        ['btn-book', 'btn-cartoon', 'btn-video', 'btn-podcast'].forEach(id => {
            document.getElementById(id).addEventListener('click', function() {
                const url = this.dataset.url;
                const type = this.dataset.type;
                if (!url) {
                    window.showToast('กำลังจัดทำเนื้อหาส่วนนี้ครับ 🙏');
                    return;
                }
                if (type === 'youtube') {
                    window.openYoutube(url);
                } else {
                    // encode เฉพาะ non-ASCII เพื่อรองรับ URL ภาษาไทย
                    const safeUrl = url.replace(/[^\x00-\x7F]/g, c => encodeURIComponent(c));
                    window.open(safeUrl, '_blank', 'noopener,noreferrer');
                }
            });
        });

        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
            }, 2500);
        }

        window.checkFavDot = function() {
            const dot = document.getElementById('fav-dot');
            myFavorites.length > 0 ? dot.classList.remove('hidden') : dot.classList.add('hidden');
        }

        window.renderList = function(data, stagger = true) {
            listContainer.innerHTML = '';
            itemCount.textContent = `${data.length} องค์`;
            
            if (data.length === 0) {
                noResults.classList.remove('hidden');
                noResults.classList.add('flex');
            } else {
                noResults.classList.add('hidden');
                noResults.classList.remove('flex');
                data.forEach((chapter, index) => {
                    const delay = stagger ? `animation-delay: ${Math.min(index * 0.04, 0.6)}s` : '';
                    const isFav = myFavorites.includes(chapter.id);
                    const item = document.createElement('div');
                    item.className = `fade-in card-group bg-white rounded-3xl overflow-hidden shadow-soft border border-stone-100 flex flex-col cursor-pointer transition-all duration-300 hover:shadow-lg hover:-translate-y-1 relative`;
                    if (stagger) item.style = delay;
                    item.innerHTML = `
                        <div onclick="window.openSheet(${chapter.id})" class="flex flex-col h-full w-full">
                            <div class="relative w-full aspect-[4/5] bg-stone-100 overflow-hidden">
                                <img src="${chapter.image}" alt="${chapter.title}" class="card-img w-full h-full object-cover transition-transform duration-700 ease-out" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-stone-900/80 via-stone-900/10 to-transparent"></div>
                                <div class="absolute top-3 left-3 bg-white/95 backdrop-blur-md text-amber-600 text-[10px] font-bold font-heading px-2 py-1 rounded-md shadow-sm border border-white/50">ที่ ${toThaiNum(chapter.id)}</div>
                                <div class="absolute bottom-3 left-3 right-3 text-white">
                                    <h3 class="font-heading font-bold text-[15px] sm:text-[16px] line-clamp-1 drop-shadow-md leading-tight">${chapter.title}</h3>
                                </div>
                            </div>
                            <div class="p-3.5 flex-grow flex flex-col bg-white">
                                <p class="text-[11px] sm:text-xs text-stone-500 line-clamp-2 leading-relaxed">${chapter.desc}</p>
                            </div>
                        </div>
                        <div class="absolute top-2.5 right-2.5 z-10">
                            <button onclick="window.toggleFavoriteInline(${chapter.id}, event)" class="w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 focus:outline-none shadow-sm ${isFav ? 'text-red-500 bg-white' : 'text-white bg-white/30 border border-white/20 hover:bg-white hover:text-red-500'}">
                                <svg class="w-4 h-4" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                            </button>
                        </div>`;
                    listContainer.appendChild(item);
                });
            }
            window.checkFavDot();
        }

        window.renderList(chapters);

        document.getElementById('searchInput').addEventListener('input', (e) => {
            if (isFavMode) window.switchTab('home');
            const term = e.target.value.toLowerCase().trim();
            const filtered = chapters.filter(ch =>
                ch.title.toLowerCase().includes(term) ||
                ch.desc.toLowerCase().includes(term) ||
                ch.id.toString().includes(term) ||
                toThaiNum(ch.id).includes(term)
            );
            window.renderList(filtered, false);
        });

        // ✅ แค่ set data-url ใหม่ — ไม่ต้อง clone หรือ add/remove listener
        window.setupSheetButton = function(btnId, url, isYoutube) {
            const btn = document.getElementById(btnId);
            btn.dataset.url = url || '';
            btn.dataset.type = isYoutube ? 'youtube' : 'link';
            if (url) {
                btn.classList.remove('disabled');
            } else {
                btn.classList.add('disabled');
            }
        }

        window.openSheet = function(id) {
            const ch = chapters.find(c => c.id === id);
            if (!ch) return;
            currentChapterId = id;
            document.getElementById('sheetOrder').textContent = `องค์ที่ ${toThaiNum(ch.id)}`;
            document.getElementById('sheetTitle').textContent = ch.title;
            document.getElementById('sheetDesc').textContent = ch.desc;
            document.getElementById('ytModalTitle').textContent = ch.title;
            window.updateSheetFavoriteIcon();
            window.setupSheetButton('btn-book', ch.urls.book, false);
            window.setupSheetButton('btn-cartoon', ch.urls.cartoon, false);
            window.setupSheetButton('btn-video', ch.urls.video, true);
            window.setupSheetButton('btn-podcast', ch.urls.podcast, true);
            document.getElementById('backdrop').classList.add('open');
            document.getElementById('bottomSheet').classList.add('open');
        }

        window.closeSheet = function() {
            document.getElementById('backdrop').classList.remove('open');
            document.getElementById('bottomSheet').classList.remove('open');
        }

        window.updateSheetFavoriteIcon = function() {
            const icon = document.getElementById('icon-favorite');
            const btn = icon.parentElement;
            if (myFavorites.includes(currentChapterId)) {
                icon.setAttribute('fill', 'currentColor');
                icon.classList.add('text-red-500');
                btn.classList.add('bg-red-50', 'border-red-100');
                btn.classList.remove('text-stone-400', 'bg-white', 'border-stone-100');
            } else {
                icon.setAttribute('fill', 'none');
                icon.classList.remove('text-red-500');
                btn.classList.remove('bg-red-50', 'border-red-100');
                btn.classList.add('text-stone-400', 'bg-white', 'border-stone-100');
            }
        }

        window.toggleFavorite = function() {
            if (!currentChapterId) return;
            const idx = myFavorites.indexOf(currentChapterId);
            if (idx === -1) { myFavorites.push(currentChapterId); window.showToast('บันทึกเข้ารายการโปรดแล้ว ⭐️'); }
            else { myFavorites.splice(idx, 1); window.showToast('นำออกจากรายการโปรดแล้ว'); }
            localStorage.setItem('anuphudhhaFavorites', JSON.stringify(myFavorites));
            window.updateSheetFavoriteIcon();
            window.checkFavDot();
            if (isFavMode) { window.renderFavs(); }
            else {
                const term = document.getElementById('searchInput').value.toLowerCase().trim();
                const filtered = term ? chapters.filter(ch => ch.title.toLowerCase().includes(term) || ch.desc.toLowerCase().includes(term)) : chapters;
                window.renderList(filtered, false);
            }
        }

        window.toggleFavoriteInline = function(id, event) {
            if (event) event.stopPropagation();
            const idx = myFavorites.indexOf(id);
            if (idx === -1) { myFavorites.push(id); window.showToast('บันทึกเข้ารายการโปรดแล้ว ⭐️'); }
            else { myFavorites.splice(idx, 1); window.showToast('นำออกจากรายการโปรดแล้ว'); }
            localStorage.setItem('anuphudhhaFavorites', JSON.stringify(myFavorites));
            window.checkFavDot();
            if (isFavMode) { window.renderFavs(); }
            else {
                const btn = event.currentTarget;
                const svg = btn.querySelector('svg');
                if (myFavorites.includes(id)) {
                    svg.setAttribute('fill', 'currentColor');
                    btn.classList.add('text-red-500', 'bg-white');
                    btn.classList.remove('text-white', 'border', 'border-white/20', 'bg-white/30');
                } else {
                    svg.setAttribute('fill', 'none');
                    btn.classList.remove('text-red-500', 'bg-white');
                    btn.classList.add('text-white', 'border', 'border-white/20', 'bg-white/30');
                }
            }
        }

        window.switchTab = function(tab) {
            window.closeSheet();
            const btnFav = document.getElementById('btn-top-fav');
            const navFav = document.getElementById('nav-fav');
            const navHome = document.getElementById('nav-home');
            if (tab === 'home') {
                isFavMode = false;
                sectionTitle.textContent = "รายนามทั้งหมด";
                btnFav.classList.remove('text-red-500', 'bg-red-50');
                btnFav.classList.add('text-stone-400');
                navHome.classList.replace('text-stone-400', 'text-monk-primary');
                navFav.classList.replace('text-monk-primary', 'text-stone-400');
                navFav.classList.remove('text-red-500');
                const term = document.getElementById('searchInput').value.toLowerCase().trim();
                const filtered = term ? chapters.filter(ch => ch.title.toLowerCase().includes(term) || ch.desc.toLowerCase().includes(term)) : chapters;
                window.renderList(filtered, false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                if (isFavMode) return;
                isFavMode = true;
                sectionTitle.textContent = "บันทึกไว้ (รายการโปรด)";
                btnFav.classList.add('text-red-500', 'bg-red-50');
                btnFav.classList.remove('text-stone-400');
                navFav.classList.replace('text-stone-400', 'text-monk-primary');
                navHome.classList.replace('text-monk-primary', 'text-stone-400');
                window.renderFavs();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.renderFavs = function() {
            const favCh = myFavorites.map(id => chapters.find(c => c.id === id)).filter(Boolean);
            if (favCh.length === 0) {
                listContainer.innerHTML = '';
                itemCount.textContent = `0 องค์`;
                document.getElementById('noResultsText').textContent = "ยังไม่ได้บันทึกเรื่องราวไว้เลยครับ กดไอคอนหัวใจเพื่อบันทึก";
                noResults.classList.remove('hidden');
                noResults.classList.add('flex');
            } else { window.renderList(favCh, false); }
        }

        window.openYoutube = function(url) {
            let videoId = '';
            if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
            else if (url.includes('youtube.com/watch')) {
                try { videoId = new URL(url).searchParams.get('v'); } catch(e) {}
            }
            if (!videoId) { window.open(url, '_blank'); return; }
            window.closeSheet();
            document.getElementById('youtubeIframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            document.getElementById('ytBackdrop').style.display = 'block';
            const ytModal = document.getElementById('ytModal');
            ytModal.classList.add('opacity-100');
            ytModal.classList.remove('pointer-events-none');
        }

        window.closeYoutube = function() {
            const ytModal = document.getElementById('ytModal');
            ytModal.classList.remove('opacity-100');
            ytModal.classList.add('pointer-events-none');
            setTimeout(() => {
                document.getElementById('ytBackdrop').style.display = 'none';
                document.getElementById('youtubeIframe').src = '';
            }, 300);
        }
    </script>
</body>
</html>
